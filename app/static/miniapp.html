<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >
    <title>HSE Business Club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5ecdf;
        --panel: rgba(255, 249, 239, 0.88);
        --panel-solid: #fff8ee;
        --panel-strong: #f1deca;
        --text: #241a13;
        --muted: #736458;
        --line: rgba(120, 92, 65, 0.16);
        --accent: #ba5b2e;
        --accent-dark: #8f4320;
        --accent-soft: #f0d9c5;
        --ok: #1e7a55;
        --error: #b13a32;
        --shadow: 0 24px 64px rgba(78, 45, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 100% 0%, rgba(240, 186, 136, 0.55), transparent 28%),
          radial-gradient(circle at 0% 100%, rgba(224, 154, 117, 0.2), transparent 25%),
          linear-gradient(180deg, #faf5ec 0%, var(--bg) 100%);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
      }

      button:active {
        transform: translateY(1px);
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 16px;
        padding: 15px 16px;
        color: var(--text);
      }

      .app-shell {
        max-width: 880px;
        margin: 0 auto;
        padding: 18px 14px 40px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 245, 230, 0.92)),
          var(--panel-solid);
        box-shadow: var(--shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -60px -80px auto;
        width: 180px;
        height: 180px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(186, 91, 46, 0.18), transparent 68%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(186, 91, 46, 0.08);
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 14px 0 10px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.95;
      }

      .hero p {
        max-width: 580px;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .status {
        margin-top: 16px;
        min-height: 24px;
        font-weight: 700;
      }

      .status.ok {
        color: var(--ok);
      }

      .status.error {
        color: var(--error);
      }

      .layout {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 18px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .card h2 {
        margin: 0;
        font-size: 20px;
      }

      .card-subtitle {
        margin-top: 6px;
        color: var(--muted);
        line-height: 1.45;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-actions,
      .stack-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button-primary {
        background: var(--accent);
        color: #fff;
      }

      .button-secondary {
        background: var(--accent-soft);
        color: var(--text);
      }

      .button-ghost {
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        border: 1px solid var(--line);
      }

      .profile-band {
        display: grid;
        gap: 18px;
        grid-template-columns: 1.35fr 1fr;
      }

      .profile-name {
        margin-top: 4px;
        font-size: 28px;
        font-weight: 800;
      }

      .balance-tile {
        display: grid;
        align-content: center;
        gap: 6px;
        min-height: 160px;
        padding: 18px;
        border-radius: 22px;
        background: linear-gradient(140deg, #2f1e17, #6e3318 80%);
        color: #fff8ef;
      }

      .balance-value {
        font-size: clamp(40px, 6vw, 64px);
        font-weight: 900;
        line-height: 1;
      }

      .meta-list {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--panel-strong);
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
      }

      .list {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .list-item {
        display: grid;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.62);
      }

      .list-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .item-title {
        font-weight: 800;
      }

      .item-meta {
        color: var(--muted);
        font-size: 14px;
      }

      .scan-grid {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .products-grid {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .product-card {
        display: grid;
        gap: 14px;
        padding: 18px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
      }

      .product-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: start;
      }

      .product-copy {
        display: grid;
        gap: 0;
      }

      .product-description {
        margin-top: 6px;
      }

      .price-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 108px;
        min-height: 36px;
        padding: 0 14px;
        align-self: center;
        text-align: center;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .empty {
        margin-top: 16px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.56);
        color: var(--muted);
      }

      .spinner {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        display: inline-block;
        animation: spin 0.8s linear infinite;
      }

      .fade-up {
        animation: fadeUp 380ms ease;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(28, 20, 15, 0.46);
        backdrop-filter: blur(6px);
        z-index: 1000;
      }

      .modal {
        width: min(100%, 420px);
        padding: 22px;
        border-radius: 24px;
        background: #fff8ee;
        border: 1px solid var(--line);
        box-shadow: 0 28px 60px rgba(37, 20, 9, 0.22);
      }

      .modal-title {
        margin: 0;
        font-size: 24px;
        font-weight: 800;
      }

      .modal-text {
        margin-top: 10px;
        color: var(--muted);
        line-height: 1.5;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 18px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 760px) {
        .grid.two,
        .profile-band {
          grid-template-columns: 1fr;
        }

        .app-shell {
          padding-inline: 12px;
        }

        .hero,
        .card {
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/static/miniapp-app.js"></script>
  </body>
</html>
